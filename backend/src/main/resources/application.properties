spring.application.name=malware-detector-backend
server.port=8080

# Firebase Admin SDK service account key path
# Set via environment variable FIREBASE_CREDENTIALS or place file at path below
firebase.credentials.path=${FIREBASE_CREDENTIALS:src/main/resources/firebase-credentials.json}
firebase.project-id=${FIREBASE_PROJECT_ID:your-firebase-project-id}

# API key for Android client authentication (simple shared secret for MVP)
# In production: replace with Firebase Auth JWT verification
app.api-key=${API_KEY:changeme-dev-key}

logging.level.com.capstone2=DEBUG
